name: SplitMux
options:
  bundleIdPrefix: com.levi
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "26.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: 2XGP34AR96
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  SplitMux:
    type: application
    platform: macOS
    sources:
      - path: SplitMux
        excludes:
          - "Resources/bin"
      - path: SplitMux/Resources/bin
        type: folder
        buildPhase: resources
    dependencies:
      - package: SwiftTerm
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.levi.SplitMux
        MARKETING_VERSION: "1.0.2"
        CURRENT_PROJECT_VERSION: 3
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: SplitMux/Info.plist
      properties:
        SUFeedURL: "https://calyx-ai.com/splitmux/appcast.xml"
        SUPublicEDKey: "EbZeL4SmTBcud40r+8WuD4aFqK02Bl/DFeKYOHHClb8="
    entitlements:
      path: SplitMux/SplitMux.entitlements
      properties:
        com.apple.security.app-sandbox: false
